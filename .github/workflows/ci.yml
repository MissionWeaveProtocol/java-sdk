name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: java-sdk-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Verify Java SDK
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Check canonical naming
        run: python3 scripts/check_repository_policy.py

      - name: Check formatting
        run: ./mvnw -B -ntp spotless:check

      - name: Run tests
        run: ./mvnw -B -ntp test

      - name: Build package
        run: ./mvnw -B -ntp package -DskipTests
